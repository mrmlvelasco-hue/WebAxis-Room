<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!--
    NOTE: Bootstrap CSS, Bootstrap Icons, and SweetAlert2 are intentionally
    NOT loaded here — they are already loaded by the parent page (base_dashboard.html).
    Loading them again inside the iframe caused duplicate requests and slow first load.
    Only load resources here that the parent page does NOT provide.
  -->
</head>

<body class="p-0 m-0 bg-white" style="font-family: 'Inter', sans-serif; color: #1e293b;">

  <div class="px-3 py-2 bg-light border-bottom d-flex align-items-center justify-content-between d-none"
     id="GridHeaderTitle" style="display:none !important;">
    <div class="d-flex align-items-center">
      <span class="badge bg-primary-subtle text-primary border border-primary-subtle me-2 px-2 py-1">
        <i class="bi bi-calendar-event"></i>
      </span>
      <div class="fw-bold text-secondary small text-uppercase tracking-wider">
        Room Availability — <span class="text-dark">{{ selected_date }}</span>
      </div>
    </div>
    <div class="small text-muted">
      <span class="me-3"><i class="bi bi-circle-fill text-success small me-1"></i> Available</span>
      <span><i class="bi bi-info-circle me-1"></i> 30m intervals</span>
    </div>
  </div>

  <div class="p-3">
    <div class="cal-grid-wrap shadow-sm border border-2 border-light-subtle">
      <div class="cal-grid-scroll">
        <table class="table table-sm table-hover mb-0 cal-grid-table">
          <thead>
            <tr>
              <th class="cal-col-room">Room</th>
              <th class="cal-col-features">Features</th>
              <th class="cal-col-cap text-center"><i class="bi bi-people me-1"></i>Cap</th>
              {% for t in time_slots %}
                <th class="cal-time-head text-center" data-time="{{ t }}">{{ t }}</th>
              {% endfor %}
            </tr>
          </thead>
          <tbody>
            {% for r in rooms %}
            <tr data-room-id="{{ r.id }}">
              <td class="cal-col-room">
                <div class="fw-bold text-dark">{{ r.name }}</div>
              </td>
              <td class="cal-col-features text-muted small">
                <div class="text-truncate" style="max-width: 350px;" title="{{ r.features }}">{{ r.features }}</div>
              </td>
              <td class="cal-col-cap text-center fw-medium text-secondary">{{ r.capacity }}</td>
              {% for t in time_slots %}
                <td class="cal-slot-cell" data-slot-index="{{ loop.index0 }}"></td>
              {% endfor %}
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>

<script>
/* =========================================================
   CALENDAR V2 EMBED
========================================================= */

const GRID_START_MIN = {{ TIMELINE_START_HOUR }} * 60;
const GRID_END_MIN   = {{ TIMELINE_END_HOUR }} * 60;
const SLOT_MINUTES   = 30;

const CURRENT_USER = {
    name    : "{{ current_user.display_name }}",
    username: "{{ current_user.username }}",
    isAdmin : {{ 'true' if current_user.is_admin() else 'false' }}
};

/* ─── In-memory reservation map  roomId_slotMin → ev ─── */
let reservationMap = {};

/* ─── Helpers ─────────────────────────────────────────── */
function toMinutes(dtStr) {
    const d = new Date(dtStr);
    return d.getHours() * 60 + d.getMinutes();
}

function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
}

function formatSlotKey(roomId, slotMin) {
    return `${roomId}_${slotMin}`;
}

function formatHHMM(dtStr) {
    if (!dtStr) return "--:--";
    const part = dtStr.includes("T") ? dtStr.split("T")[1] : dtStr;
    return part.substring(0, 5);
}

/* ─── Clear Grid ──────────────────────────────────────── */
function clearGrid() {
    reservationMap = {};
    document.querySelectorAll(".cal-slot-cell").forEach(td => {
        td.classList.remove("cal-booked", "cal-booked-start", "cal-booked-end",
                            "status-approved", "status-pending", "status-blocked");
        td.innerHTML = "";
        td.removeAttribute("data-room-id");
        td.removeAttribute("data-slot-min");
        td.style.backgroundColor = "";
        td.title = "";
    });
}

/* ─── Paint Reservations ──────────────────────────────── */
function paintReservation(ev) {

    const row = document.querySelector(`tr[data-room-id="${ev.room_id}"]`);
    if (!row) return;

    let startMin = toMinutes(ev.start);
    let endMin   = toMinutes(ev.end);
    if (endMin <= startMin) return;

    startMin = clamp(startMin, GRID_START_MIN, GRID_END_MIN);
    endMin   = clamp(endMin,   GRID_START_MIN, GRID_END_MIN);

    const startIdx = Math.floor((startMin - GRID_START_MIN) / SLOT_MINUTES);
    const endIdx   = Math.ceil( (endMin   - GRID_START_MIN) / SLOT_MINUTES);

    const status = (ev.status || "").toLowerCase();

    for (let i = startIdx; i < endIdx; i++) {

        const cell = row.querySelector(`td.cal-slot-cell[data-slot-index="${i}"]`);
        if (!cell) continue;

        const slotMin = GRID_START_MIN + (i * SLOT_MINUTES);

        cell.classList.add("cal-booked");

        /* Status colour class */
        if (status === "pending")  cell.classList.add("status-pending");
        else if (status === "blocked") cell.classList.add("status-blocked");
        else cell.classList.add("status-approved");

        /* Start / end rounded corners */
        if (i === startIdx) cell.classList.add("cal-booked-start");
        if (i === endIdx - 1) cell.classList.add("cal-booked-end");

        cell.dataset.roomId  = ev.room_id;
        cell.dataset.slotMin = slotMin;

        cell.title =
            "Room: "        + ev.room        + "\n" +
            "Reserved By: " + ev.reserved_by + "\n" +
            "Time: "        + formatHHMM(ev.start) + " – " + formatHHMM(ev.end) + "\n" +
            "Title: "       + (ev.remarks || "No title");

        /* Store full ev in map for every slot it occupies */
        reservationMap[formatSlotKey(ev.room_id, slotMin)] = ev;

        /* Remarks label on every cell — short truncation fits the 90px slot width */
        if (ev.remarks) {
            const div = document.createElement("div");
            div.className   = "cal-remarks";
            div.textContent = ev.remarks.length > 10
                ? ev.remarks.substring(0, 10) + "…"
                : ev.remarks;
            cell.appendChild(div);
        }
    }
}

/* ─── Global Click Handler ────────────────────────────── */
document.addEventListener("click", function (e) {

    const cell = e.target.closest(".cal-slot-cell");
    if (!cell) return;

    const row = cell.closest("tr");
    if (!row) return;

    const roomId    = row.dataset.roomId;
    const slotIndex = parseInt(cell.dataset.slotIndex);
    if (!roomId || isNaN(slotIndex)) return;

    const slotMin   = GRID_START_MIN + (slotIndex * SLOT_MINUTES);
    const key       = formatSlotKey(roomId, slotMin);
    const reservation = reservationMap[key];

    if (reservation) {
        /* Booked slot → tell parent to show details */
        window.parent.postMessage({
            type: "SHOW_RESERVATION",
            data: reservation
        }, "*");
    } else {
        /* Empty slot → tell parent to open new reservation modal */
        window.parent.postMessage({
            type: "OPEN_NEW_RESERVATION",
            room_id : roomId,
            slot_min: slotMin
        }, "*");
    }
});

/* ─── Load & Paint ────────────────────────────────────── */
async function loadAndPaint() {

    clearGrid();

    const date     = "{{ selected_date }}";
    const location = "{{ location_filter }}";
    const room     = "{{ room_filter }}";

    const url =
        `/api/reservations_v2_day?date=${encodeURIComponent(date)}`
        + `&location=${encodeURIComponent(location)}`
        + `&room=${encodeURIComponent(room)}`;

    try {
        const res = await fetch(url, {
            headers: { "Accept": "application/json" }
        });

        if (res.status === 401) {
            /* Session expired — tell parent to do a full-page redirect */
            window.parent.postMessage({ type: "SESSION_EXPIRED" }, "*");
            return;
        }

        const data = await res.json();
        (data || []).forEach(paintReservation);
    } catch (err) {
        console.error("loadAndPaint error:", err);
    }
}

document.addEventListener("DOMContentLoaded", loadAndPaint);

</script>

<style>
  :root {
    --booked-bg    : #10b981;
    --booked-border: #059669;
    --pending-bg   : #f59e0b;
    --pending-border: #d97706;
    --blocked-bg   : #ef4444;
    --blocked-border: #dc2626;
    --frozen-bg    : #ffffff;
    --header-bg    : #f8fafc;
  }

  .cal-grid-wrap {
    border-radius: 12px; overflow: hidden; background: #fff; width: 100%;
    height: calc(100vh - 64px - 24px); display: flex; flex-direction: column;
  }
  .cal-grid-scroll {
    overflow: auto; flex: 1 1 auto; position: relative; scroll-behavior: smooth;
  }
  .cal-grid-table { border-collapse: separate !important; border-spacing: 0 !important; }
  .cal-grid-table th, .cal-grid-table td {
    white-space: nowrap; font-size: 13px; padding: 12px 14px;
    border-bottom: 1px solid #f1f5f9; border-right: 1px solid #f1f5f9;
  }

  /* Sticky header */
  .cal-grid-table thead th {
    position: sticky; top: 0; background: var(--header-bg); z-index: 10;
    font-weight: 600; color: #64748b; border-bottom: 2px solid #e2e8f0;
  }

  /* Fixed columns */
  .cal-time-head, .cal-slot-cell { width: 90px; min-width: 90px; max-width: 90px; }
  .cal-col-room, .cal-col-features, .cal-col-cap {
    position: sticky; background: var(--frozen-bg); z-index: 6;
  }
  .cal-col-room     { left: 0;    min-width: 200px; width: 200px; z-index: 8; box-shadow: 2px 0 5px -2px rgba(0,0,0,0.05); }
  .cal-col-features { left: 200px; min-width: 50px; width: 50px; z-index: 7; }
  .cal-col-cap      { left: 200px; min-width: 30px;  width: 80px;  z-index: 7; border-right: 2px solid #cbd5e1; }

  .cal-grid-table thead th.cal-col-room,
  .cal-grid-table thead th.cal-col-features,
  .cal-grid-table thead th.cal-col-cap { z-index: 20; background: var(--header-bg); }

  /* Slot states */
  .cal-slot-cell {
    cursor: pointer;
    position: relative;
    z-index: 1;
    transition: background 0.15s, box-shadow 0.15s;
  }

  /* Empty slot — clickable cue */
  .cal-slot-cell:not(.cal-booked):hover {
    background-color: #eff6ff;
    box-shadow: inset 0 0 0 2px #3b82f6;
  }

  /* Plus icon on hover — appears in the center of each empty cell */
  .cal-slot-cell:not(.cal-booked)::after {
    content: "+";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 600;
    color: #3b82f6;
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .cal-slot-cell:not(.cal-booked):hover::after {
    opacity: 1;
  }

  /* Active press feedback */
  .cal-slot-cell:not(.cal-booked):active {
    background-color: #dbeafe;
    box-shadow: inset 0 0 0 2px #2563eb;
  }

  .cal-slot-cell.cal-booked {
    color: white; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3); transition: filter 0.15s, transform 0.1s;
  }
  .cal-slot-cell.cal-booked:hover {
    filter: brightness(1.08);
    cursor: pointer;
  }

  /* Status colours */
  .cal-slot-cell.status-approved { background: var(--booked-bg); }
  .cal-slot-cell.status-pending  { background: var(--pending-bg); }
  .cal-slot-cell.status-blocked  { background: var(--blocked-bg); }

  /* Start / end rounded caps */
  .cal-slot-cell.cal-booked-start {
    border-left: 2px solid rgba(0,0,0,0.15) !important;
    border-top-left-radius: 6px; border-bottom-left-radius: 6px;
  }
  .cal-slot-cell.cal-booked-end {
    border-right: 2px solid rgba(0,0,0,0.15) !important;
    border-top-right-radius: 6px; border-bottom-right-radius: 6px;
  }

  /* Remarks label */
  .cal-remarks {
    display: flex; align-items: center; height: 100%; padding-left: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-size: 11px; font-weight: 500;
  }

  /* Scrollbar */
  .cal-grid-scroll::-webkit-scrollbar        { height: 8px; width: 8px; }
  .cal-grid-scroll::-webkit-scrollbar-track  { background: #f1f5f9; }
  .cal-grid-scroll::-webkit-scrollbar-thumb  { background: #cbd5e1; border-radius: 10px; }
  .cal-grid-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>

</body>
</html>
